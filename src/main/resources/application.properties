spring.application.name=eduSpring

#热部署
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/java

#数据库基本配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/eduspring?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456

## MyBatis-Plus 配置
#mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
##扫描实体类的路径
#mybatis-plus.type-aliases-package=com.edu.spring.entity
##开启驼峰和下划线映射
#mybatis-plus.configuration.map-underscore-to-camel-case=true

# MyBatis 配置
mybatis.mapper-locations=classpath:mapper/*.xml
#扫描实体类的路径
mybatis.type-aliases-package=com.onik.eduspring.entity
#日志输出
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
#开启驼峰和下划线映射
mybatis.configuration.map-underscore-to-camel-case=true

#阿里云OSS
aliyun.endpoint=oss-cn-shanghai.aliyuncs.com
#读取系统变量里的阿里云密钥
aliyun.access-key-id=${ALIYUN_ACCESS_KEY_ID}
aliyun.access-key-secret=${ALIYUN_ACCESS_KEY_SECRET}
aliyun.bucket-name=web-eduspring

#格式化时间
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8

# 单个文件最大 500MB
spring.servlet.multipart.max-file-size=500MB
# 总上传请求最大 1000MB
spring.servlet.multipart.max-request-size=1000MB

